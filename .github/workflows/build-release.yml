name: Build and Release Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create / update (e.g. v0.1.12)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: beam-node-agent-linux
          - os: macos-latest
            artifact: beam-node-agent-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller aiohttp pyyaml "pydantic>=2.0"
          pip install -e .

      - name: Verify package imports
        run: |
          python -c "from beam_node_agent.service import NodeAgent; print('service OK')"
          python -c "from beam_node_agent.config import load_config; print('config OK')"
          python -c "from beam_node_agent.petals_wrapper import PetalsWrapper; print('petals_wrapper OK')"
          python -c "from beam_node_agent.node_identity import NodeIdentity; print('node_identity OK')"

      - name: Build binary
        run: |
          pyinstaller --onefile \
            --name ${{ matrix.artifact }} \
            --paths . \
            --collect-all beam_node_agent \
            --collect-all aiohttp \
            --collect-all pydantic \
            --collect-all yaml \
            --hidden-import beam_node_agent \
            --hidden-import beam_node_agent.config \
            --hidden-import beam_node_agent.service \
            --hidden-import beam_node_agent.petals_wrapper \
            --hidden-import beam_node_agent.node_identity \
            --hidden-import beam_node_agent.beam_node_agent \
            --hidden-import aiohttp \
            --hidden-import aiohttp.web \
            --hidden-import aiohttp.web_app \
            --hidden-import aiohttp.web_request \
            --hidden-import aiohttp.web_response \
            --hidden-import aiohttp.web_runner \
            --hidden-import aiohttp.web_server \
            --hidden-import aiohttp.client \
            --hidden-import aiohttp.connector \
            --hidden-import multidict \
            --hidden-import yarl \
            --hidden-import aiosignal \
            --hidden-import frozenlist \
            --hidden-import async_timeout \
            --hidden-import pydantic \
            --hidden-import pydantic.fields \
            --hidden-import yaml \
            --hidden-import pdb \
            --hidden-import bdb \
            --hidden-import cmd \
            --hidden-import code \
            --hidden-import cmath \
            --hidden-import pickletools \
            beam_node_agent/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Beam Node Agent ${{ steps.tag.outputs.tag }}"
          body: |
            Automated binary build from commit ${{ github.sha }}.
          files: |
            beam-node-agent-linux/beam-node-agent-linux
            beam-node-agent-macos/beam-node-agent-macos
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
